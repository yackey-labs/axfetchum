[package]
versioned_files = ["Cargo.toml", "Cargo.lock"]
changelog = "CHANGELOG.md"
extra_changelog_sections = [
    { name = "Refactoring", types = ["refactor"] },
    { name = "Performance", types = ["perf"] },
    { name = "Documentation", types = ["docs"] },
]

[github]
owner = "yackey-labs"
repo = "axum-ts-client"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "Command"
command = "git commit -m \"chore: prepare release $version\""

[[workflows.steps]]
type = "Command"
command = "git push"

[[workflows.steps]]
type = "Release"
