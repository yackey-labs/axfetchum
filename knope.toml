[package]
versioned_files = ["Cargo.toml", "Cargo.lock"]
changelog = "CHANGELOG.md"
extra_changelog_sections = [
    { name = "Refactoring", types = ["refactor"] },
    { name = "Performance", types = ["perf"] },
    { name = "Documentation", types = ["docs"] },
]

[gitea]
owner = "yackey-cloud"
repo = "axum-ts-client"
host = "https://forgejo.yackey.cloud"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "Command"
command = "git commit -m \"chore: prepare release $version\""

# Publish before git push — the push triggers a new CI run that may
# cancel this job, so cargo publish must complete first.
[[workflows.steps]]
type = "Command"
command = "cargo publish --registry yauth --no-verify --allow-dirty"
shell = true

[[workflows.steps]]
type = "Command"
command = "git push"

[[workflows.steps]]
type = "Release"
